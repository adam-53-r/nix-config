keys:
  # Users
  - &users:
    - &adamr:
      - &yubikey1 6ACA954E816AAD56059AC982B89535606CB2336E!
      - &yubikey2 AAD31CF640D3F9F1BE668BBCC57EE34ED704637F!
  # Hosts
  - &hosts:
    - &msi-nixos age1ny9nuyaxyakpfj3ee3229au4caugv9205leu9vlrfwx4h24fq33qs7jht5
    - &pc age1h5f37l0l9mn24s76mj703y20s65kr7a4ym7xkh55js4gf476fy3sj3hlex
    - &msi-server age1l4pd7yy0qpgvakwec9f8xzcys70q5uf48n7fw6j3p6csryl6lu4qzc6jfh

creation_rules:
  # Shared user secrets (account passwords, wireguard psk) — encrypted to every
  # host that wires userAdamr with sops enabled.
  - path_regex: modules/hosts/common/users/secrets.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *msi-nixos
          - *pc
          - *msi-server
        pgp:
          - *yubikey1
          - *yubikey2

  - path_regex: modules/hosts/pc/secrets.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *pc
        pgp:
          - *yubikey1
          - *yubikey2

  - path_regex: modules/hosts/msi-nixos/secrets.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *msi-nixos
        pgp:
          - *yubikey1
          - *yubikey2

  # Any secrets.<ext> or *.sops file under msi-server (the service stack keeps
  # per-service secrets next to the service module).
  - path_regex: modules/hosts/msi-server/.*(secrets.(yaml|json|env|ini)|.*.sops)$
    key_groups:
      - age:
          - *msi-server
        pgp:
          - *yubikey1
          - *yubikey2
